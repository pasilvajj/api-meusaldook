spring.application.name=api-meusaldook

# Credenciais PostgreSQL: variáveis DATABASE_* (recomendado em produção) ou perfil "local".
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/finance}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:root}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

app.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.password-reset.token-expiration-ms=${PASSWORD_RESET_EXPIRATION_MS:3600000}
app.password-reset.frontend-url=${FRONTEND_URL:http://localhost:4200}
app.password-reset.mobile-scheme=${MOBILE_SCHEME:financemobile}

app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@meusaldook.local}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.port=8081

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=2m
